spring.application.name=sr-inference
server.port=11000

spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/sr_server?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8
spring.datasource.username=root
spring.datasource.password=root

spring.data.redis.host=sr-redis
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0

spring.cloud.nacos.discovery.server-addr=sr-nacos:8848
spring.cloud.nacos.config.server-addr=sr-nacos:8848
spring.config.import[0]=nacos:modelConfig-docker.yml?group=DEFAULT_GROUP
#spring.config.import[1]=nacos:{dataId1}?group={group1}

rocketmq.name-server=sr-rocketmq-nameserver:9876
rocketmq.producer.group=sr-task-producer-group
rocketmq.consumer.group=sr-task-consumer-group

logging.level.com.example.srinference=debug